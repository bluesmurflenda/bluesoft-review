document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-accent);\">LAB<\u002Fspan><\u002Fspan>\n      <span style=\"font-size:10px;font-weight:600;letter-spacing:.18em;color:#9AA0B5;\">WEB AGENCY<\u002Fspan>\n    <\u002Fa>\n    <nav data-nav-d=\"\" style=\"align-items:center;gap:clamp(16px,2.2vw,38px);\">\n      <a href=\"#hero\" style=\"font-size:13px;font-weight:600;letter-spacing:.08em;color:#33384A;\">HOME<\u002Fa>\n      <a href=\"#about\" style=\"font-size:13px;font-weight:600;letter-spacing:.08em;color:#33384A;\">ABOUT<\u002Fa>\n      <a href=\"#works\" style=\"font-size:13px;font-weight:600;letter-spacing:.08em;color:#33384A;\">WORKS<\u002Fa>\n      <a href=\"#blog\" style=\"font-size:13px;font-weight:600;letter-spacing:.08em;color:#33384A;\">BLOG<\u002Fa>\n      <a href=\"#location\" style=\"font-size:13px;font-weight:600;letter-spacing:.08em;color:#33384A;\">LOCATION<\u002Fa>\n      <a href=\"#request\" style=\"display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;letter-spacing:.04em;padding:11px 20px;border-radius:2px;\">REQUEST <span style=\"font-size:15px;line-height:1;\">→<\u002Fspan><\u002Fa>\n    <\u002Fnav>\n    <button data-burger=\"\" onclick=\"{{ toggleMenu }}\" aria-label=\"menu\" style=\"flex-direction:column;gap:5px;width:42px;height:42px;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;\">\n      <span style=\"width:22px;height:2px;background:var(--ink);display:block;\"><\u002Fspan>\n      <span style=\"width:22px;height:2px;background:var(--ink);display:block;\"><\u002Fspan>\n      <span style=\"width:22px;height:2px;background:var(--ink);display:block;\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeMenu }}\" style=\"position:fixed;inset:0;z-index:99;background:#fff;display:flex;flex-direction:column;justify-content:center;gap:6px;padding:0 32px;animation:bl-fade .25s ease both;\">\n      <a href=\"#hero\" onclick=\"{{ closeMenu }}\" style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:36px;letter-spacing:-.02em;color:var(--ink);padding:8px 0;\">HOME<\u002Fa>\n      <a href=\"#about\" onclick=\"{{ closeMenu }}\" style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:36px;letter-spacing:-.02em;color:var(--ink);padding:8px 0;\">ABOUT<\u002Fa>\n      <a href=\"#works\" onclick=\"{{ closeMenu }}\" style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:36px;letter-spacing:-.02em;color:var(--ink);padding:8px 0;\">WORKS<\u002Fa>\n      <a href=\"#blog\" onclick=\"{{ closeMenu }}\" style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:36px;letter-spacing:-.02em;color:var(--ink);padding:8px 0;\">BLOG<\u002Fa>\n      <a href=\"#location\" onclick=\"{{ closeMenu }}\" style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:36px;letter-spacing:-.02em;color:var(--ink);padding:8px 0;\">LOCATION<\u002Fa>\n      <a href=\"#request\" onclick=\"{{ closeMenu }}\" style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:36px;letter-spacing:-.02em;color:var(--accent);padding:8px 0;\">REQUEST<\u002Fa>\n      <span style=\"margin-top:22px;font-size:12px;letter-spacing:.05em;color:#9AA0B5;\">TAP ANYWHERE TO CLOSE<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"hero\" style=\"position:relative;min-height:100vh;display:flex;align-items:center;padding:120px clamp(20px,5vw,72px) 80px;overflow:hidden;\">\n    <div data-parallax=\"0.6\" style=\"position:absolute;top:10%;right:8%;width:min(34vw,400px);height:min(34vw,400px);background:var(--accent);border-radius:50%;z-index:0;\"><\u002Fdiv>\n    <div data-parallax=\"1.2\" data-rot=\"1\" style=\"position:absolute;top:46%;right:30%;width:min(14vw,150px);height:min(14vw,150px);border:2px solid var(--accent);z-index:0;transform:rotate(45deg);\"><\u002Fdiv>\n    <div data-parallax=\"0.35\" style=\"position:absolute;left:-2%;bottom:-8%;font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:min(28vw,400px);line-height:.8;letter-spacing:-.04em;color:#F1F3FB;z-index:0;user-select:none;\">LAB<\u002Fdiv>\n    <div style=\"position:relative;z-index:2;max-width:1280px;margin:0 auto;width:100%;\">\n      <div style=\"overflow:hidden;\"><span data-reveal=\"\" data-reveal-delay=\"40\" style=\"display:inline-block;font-size:14px;font-weight:600;letter-spacing:.28em;color:var(--accent);\">CREATIVE &amp; CHALLENGE DESIGN GROUP<\u002Fspan><\u002Fdiv>\n      <h1 style=\"font-family:'Helvetica Neue',Helvetica,Arial;font-weight:800;letter-spacing:-.025em;line-height:.92;text-transform:uppercase;color:var(--ink);margin-top:24px;font-size:clamp(44px,9vw,150px);\">\n        <span style=\"display: block; overflow: hidden; font-size: 120px\"><span data-reveal=\"\" data-reveal-delay=\"110\" style=\"display: inline-block; font-size: 100px\">BLUELAB IS A<\u002Fspan><\u002Fspan>\n        <span style=\"display: block; overflow: hidden; font-size: 120px\"><span data-reveal=\"\" data-reveal-delay=\"190\" style=\"display: inline-block; color: var(--accent); font-size: 100px\">CREATIVE &amp;<\u002Fspan><\u002Fspan>\n        <span style=\"display: block; overflow: hidden; font-size: 120px\"><span data-reveal=\"\" data-reveal-delay=\"270\" style=\"display: inline-block; font-size: 100px\">CHALLENGE<\u002Fspan><\u002Fspan>\n        <span style=\"display: block; overflow: hidden; font-size: 120px\"><span data-reveal=\"\" data-reveal-delay=\"350\" style=\"display: inline-block; font-size: 100px\">DESIGN GROUP<\u002Fspan><\u002Fspan>\n      <\u002Fh1>\n      <p data-reveal=\"\" data-reveal-delay=\"440\" style=\"margin-top:34px;max-width:480px;font-size:clamp(15px,1.3vw,19px);line-height:1.75;color:#4A4F63;\">\n        기획·디자인·개발을 한 호흡으로. 블루소프트 웹에이전시 사업부가 도전적이고 창의적인 디지털 경험을 만듭니다.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:34px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:12px;z-index:2;\">\n      <span style=\"font-size:10px;letter-spacing:.25em;color:#9AA0B5;\">SCROLL<\u002Fspan>\n      <span style=\"position:relative;width:1px;height:48px;background:#D8DCEC;overflow:hidden;\"><span style=\"position:absolute;top:0;left:0;width:1px;height:18px;background:var(--accent);animation:bl-dot 1.8s ease-in-out infinite;\"><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== MARQUEE ===== -->\n  <div style=\"border-top:1px solid #EAEDF6;border-bottom:1px solid #EAEDF6;padding:22px 0;overflow:hidden;white-space:nowrap;\">\n    <div style=\"display:inline-flex;animation:bl-marquee 24s linear infinite;\">\n      <span style=\"display:inline-flex;align-items:center;gap:46px;padding-right:46px;font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:24px;letter-spacing:-.01em;text-transform:uppercase;color:var(--ink);\">\n        <span style=\"font-size: 24px\">WEBSITE<\u002Fspan><span style=\"color: var(--accent); font-size: 20px\">●<\u002Fspan><span style=\"font-size: 24px\">SHOPPING&nbsp;MALL<\u002Fspan><span style=\"color: var(--accent); font-size: 20px\">●<\u002Fspan><span style=\"font-size: 24px\">BRANDING<\u002Fspan><span style=\"color: var(--accent); font-size: 20px\">●<\u002Fspan><span style=\"font-size: 24px\">E-BUSINESS<\u002Fspan><span style=\"color: var(--accent); font-size: 20px\">●<\u002Fspan><span style=\"font-size: 24px\">WEB&nbsp;CONTENTS<\u002Fspan><span style=\"color: var(--accent); font-size: 20px\">●<\u002Fspan><span style=\"font-size: 24px\">UI/UX<\u002Fspan><span style=\"color: var(--accent); font-size: 20px\">●<\u002Fspan>\n      <\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:46px;padding-right:46px;font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:24px;letter-spacing:-.01em;text-transform:uppercase;color:var(--ink);\">\n        <span style=\"font-size: 24px\">WEBSITE<\u002Fspan><span style=\"color:var(--accent);\">●<\u002Fspan><span>SHOPPING&nbsp;MALL<\u002Fspan><span style=\"color:var(--accent);\">●<\u002Fspan><span>BRANDING<\u002Fspan><span style=\"color:var(--accent);\">●<\u002Fspan><span>E-BUSINESS<\u002Fspan><span style=\"color:var(--accent);\">●<\u002Fspan><span>WEB&nbsp;CONTENTS<\u002Fspan><span style=\"color:var(--accent);\">●<\u002Fspan><span>UI/UX<\u002Fspan><span style=\"color:var(--accent);\">●<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== ABOUT ===== -->\n  <section id=\"about\" style=\"padding:clamp(90px,13vh,170px) clamp(20px,5vw,72px);max-width:1280px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font-size:13px;font-weight:600;letter-spacing:.22em;color:var(--accent);\">ABOUT — 웹에이전시 사업부<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"margin-top:26px;max-width:980px;font-family:'Helvetica Neue',Helvetica,Arial;font-weight:800;font-size:clamp(28px,4.4vw,68px);line-height:1.08;letter-spacing:-.02em;color:var(--ink);\">\n      합리적인 비용으로, <span style=\"color:var(--accent);\">높은 퀄리티<\u002Fspan>의 결과물을. 우리는 끊임없이 탐구하고 질문하며 <span style=\"color:var(--accent);\">참신한 결과<\u002Fspan>를 만듭니다.\n    <\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:clamp(24px,3vw,48px);margin-top:clamp(50px,7vw,90px);\">\n      <div data-reveal=\"\">\n        <div style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:22px;color:var(--accent);\">#Creative<\u002Fdiv>\n        <p style=\"margin-top:12px;font-size:15px;line-height:1.8;color:#4A4F63;\">끊임없는 탐구·질문·연구로 창의적이고 참신한 결과물을 제공합니다.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"80\">\n        <div style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:22px;color:var(--accent);\">#Delicate<\u002Fdiv>\n        <p style=\"margin-top:12px;font-size:15px;line-height:1.8;color:#4A4F63;\">1픽셀의 오차도 용납하지 않는 섬세함과 집요함으로 마감합니다.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"160\">\n        <div style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:22px;color:var(--accent);\">#Various<\u002Fdiv>\n        <p style=\"margin-top:12px;font-size:15px;line-height:1.8;color:#4A4F63;\">다양한 경험과 검증된 최신 기술로 최적의 솔루션을 제시합니다.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"240\">\n        <div style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:22px;color:var(--accent);\">#Easy<\u002Fdiv>\n        <p style=\"margin-top:12px;font-size:15px;line-height:1.8;color:#4A4F63;\">시작부터 완료 후까지 친절하고 편안한 소통으로 함께합니다.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SERVICE ===== -->\n  <section id=\"service\" style=\"padding:0 clamp(20px,5vw,72px) clamp(40px,6vw,90px);max-width:1280px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font-size:13px;font-weight:600;letter-spacing:.22em;color:var(--accent);margin-bottom:30px;\">WHAT WE DO<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(14px,1.6vw,22px);\">\n      <div data-reveal=\"\" style=\"background:var(--accent);color:#fff;border-radius:4px;padding:clamp(28px,3.2vw,44px);min-height:clamp(220px,24vw,300px);display:flex;flex-direction:column;justify-content:space-between;\">\n        <span style=\"font:600 13px ui-monospace,Menlo,monospace;letter-spacing:.1em;opacity:.7;\">01<\u002Fspan>\n        <div><h3 style=\"font-family:'Helvetica Neue',Helvetica;font-weight:800;font-size:clamp(24px,2.6vw,34px);letter-spacing:-.01em;\">웹사이트 / 쇼핑몰 제작<\u002Fh3><p style=\"margin-top:12px;font-size:15px;line-height:1.7;color:rgba(255,255,255,.82);\">반응형 홈페이지부터 브랜드몰·소호몰까지, 합리적 비용의 고퀄리티 제작.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"80\" style=\"background:#0B0B14;color:#fff;border-radius:4px;padding:clamp(28px,3.2vw,44px);min-height:clamp(220px,24vw,300px);display:flex;flex-dir '--works-cols', String(this.props.worksColumns ?? 3));\n    const grid = root.querySelector('[data-works-grid]');\n    if (grid && !grid._painted) {\n      grid._painted = true;\n      const items = [\n        { t: '대학 브랜드 사이트', c: 'WEBSITE', h: 340, tint: '#E4EAFB' },\n        { t: '리빙 브랜드몰', c: 'SHOPPING', h: 260, tint: '#EEF1FA' },\n        { t: '기업 아이덴티티', c: 'BRANDING', h: 300, tint: '#E7ECFB' },\n        { t: '뷰티 상세페이지', c: 'CONTENTS', h: 380, tint: '#EAEFFC' },\n        { t: '협회 반응형 홈페이지', c: 'WEBSITE', h: 280, tint: '#E8EDFC' },\n        { t: '푸드 쇼핑몰', c: 'SHOPPING', h: 320, tint: '#E4EAFB' },\n        { t: '스타트업 랜딩', c: 'WEBSITE', h: 250, tint: '#EEF1FA' },\n        { t: '캠페인 비주얼', c: 'BRANDING', h: 360, tint: '#E7ECFB' },\n        { t: '병원 예약 사이트', c: 'WEBSITE', h: 300, tint: '#EAEFFC' },\n      ];\n      grid.innerHTML = items.map((it, i) =>\n        '<a href=\"#works\" data-work-card style=\"display:block;break-inside:avoid;margin-bottom:clamp(14px,1.6vw,22px);border-radius:4px;overflow:hidden;background:#fff;box-shadow:0 1px 2px rgba(11,11,20,.05);\">' +\n          '<div style=\"height:' + it.h + 'px;background:repeating-linear-gradient(135deg,' + it.tint + ',' + it.tint + ' 13px,#DCE3F6 13px,#DCE3F6 26px);position:relative;display:flex;align-items:center;justify-content:center;color:#9AA3C0;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.15em;\">[ WORK ' + (i + 1 < 10 ? '0' : '') + (i + 1) + ' ]<\u002Fdiv>' +\n          '<div style=\"padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;\">' +\n            '<span style=\"font-size:15px;font-weight:700;color:#0B0B14;\">' + it.t + '<\u002Fspan>' +\n            '<span style=\"font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.1em;color:#2186de;\">' + it.c + '<\u002Fspan>' +\n          '<\u002Fdiv>' +\n        '<\u002Fa>'\n      ).join('');\n    }\n  }\n\n  initMotion() {\n    const root = this._root;\n    if (!root) return;\n    if (this.props.reduceMotion) { this.handleScroll(); return; }\n    const reveals = root.querySelectorAll('[data-reveal]');\n    reveals.forEach(el => {\n      const d = el.getAttribute('data-reveal-delay') || 0;\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(38px)';\n      el.style.transition = 'opacity .9s cubic-bezier(.16,1,.3,1) ' + d + 'ms, transform .9s cubic-bezier(.16,1,.3,1) ' + d + 'ms';\n    });\n    this._io = new IntersectionObserver(entries => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });\n    reveals.forEach(el => this._io.observe(el));\n    this.handleScroll();\n  }\n\n  handleScroll() {\n    const root = this._root;\n    if (!root) return;\n    const y = window.scrollY || window.pageYOffset || 0;\n    const header = root.querySelector('[data-header]');\n    if (header) {\n      if (y > 40) {\n        header.style.background = 'rgba(255,255,255,.9)';\n        header.style.boxShadow = '0 1px 0 rgba(11,11,20,.07)';\n        header.style.backdropFilter = 'blur(12px)';\n        header.style.webkitBackdropFilter = 'blur(12px)';\n      } else {\n        header.style.background = 'transparent';\n        header.style.boxShadow = 'none';\n        header.style.backdropFilter = 'none';\n        header.style.webkitBackdropFilter = 'none';\n      }\n    }\n    if (this.props.reduceMotion) return;\n    root.querySelectorAll('[data-parallax]').forEach(el => {\n      const speed = parseFloat(el.getAttribute('data-parallax')) || 0.3;\n      const rect = el.getBoundingClientRect();\n      const off = rect.top + rect.height / 2 - window.innerHeight / 2;\n      el.style.transform = 'translateY(' + (off * speed * -0.12).toFixed(1) + 'px)' + (el.dataset.rot ? ' rotate(45deg)' : '');\n    });\n  }\n\n  renderVals() {\n    return {\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      rootRef: el => { if (el) this._root = el; },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
